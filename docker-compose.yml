version: '3.8'

services:
  # --- DATABASE ---
  db:
    image: postgres:16-alpine
    container_name: wms-db
    restart: always
    environment:
      POSTGRES_DB: wms_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d wms_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- BACKEND ---
  backend:
    build: .
    container_name: wms-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Punta al DB locale nel container
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/wms_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - DB_PASSWORD=password

  # --- FRONTEND ---
  frontend:
    build:
      context: ./frontend
      args:
        # URL vuoto = Axios usa path relativi (/api/...) che Nginx proxya verso backend:8080
        - VITE_API_URL=
    container_name: wms-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
# ===============================
# CONFIGURAZIONE DATABASE (AWS RDS)
# ===============================

spring.datasource.url=jdbc:postgresql://wms-database.cfo8my6uslea.eu-north-1.rds.amazonaws.com:5432/wms_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


# ===============================
# CONFIGURAZIONE SERVER WEB
# ===============================
server.port=8080

# ===============================
# TIMEOUT CONNESSIONE & POOL (previene i 403 da timeout sotto carico)
# ===============================
# Timeout per acquisire una connessione dal pool (30 secondi)
spring.datasource.hikari.connection-timeout=30000
# Timeout per connessioni inattive nel pool (10 minuti)
spring.datasource.hikari.idle-timeout=600000
# Dimensione massima del pool di connessioni
spring.datasource.hikari.maximum-pool-size=15
# Timeout massimo risposta HTTP asincrona (60 secondi)
spring.mvc.async.request-timeout=60000
# Timeout connessione Tomcat (60 secondi)
server.tomcat.connection-timeout=60000

# ===============================
# LOGGING (Per vedere le query in console)
# ===============================
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

spring.jpa.hibernate.ddl-auto=update

# FORZA L'ATTIVAZIONE DELLA CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console